name:                nesh
version:             0.1.0.0
description:         NES Emulator in Stateful Haskell
license:             BSD3
author:              Nick Chapman
maintainer:          nic@amadido.co.uk
github:              Nick-Chapman/nesh.git

dependencies:
- array
- base >= 4.7 && < 5
- bytestring
- clock
- containers
- sdl2
- sdl2-ttf
- text

default-extensions:
- BangPatterns
- DuplicateRecordFields
- GADTs
- GeneralizedNewtypeDeriving
- ImportQualifiedPost
- LambdaCase
- MultiWayIf
- NamedFieldPuns
- NumericUnderscores
- RecordWildCards
- ScopedTypeVariables
- Strict

ghc-options:
- -Werror
- -Wall
- -Wno-name-shadowing
# Default optimisation is -O == -O1
- -O2

library:
  source-dirs: src

executables:
  main.exe:
    main:                app/main.hs
    dependencies:        nesh
